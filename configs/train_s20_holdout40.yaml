defaults:
  - _self_

seed: 42

datamodule:
  _target_: contrasted.data.EmbeddingDataModule
  train_fasta: data/s20_strict_holdout40_c123/train.fasta
  val_fasta: data/s20_strict_holdout40_c123/val.fasta
  test_fasta: data/s20_strict_holdout40_c123/test.fasta
  embedding_dir: data/cath-domain-seqs-S100-prostt5
  batch_size: 1024
  num_workers: 4

model:
  _target_: contrasted.model.ContrastiveModel
  input_dim: 1024
  hidden_dim: 512
  output_dim: 128
  dropout: 0.1
  loss_type: proxy_anchor
  loss_params:
    margin: 0.3
    alpha: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_epochs: ${trainer.max_epochs}
  warmup_epochs: 10

trainer:
  max_epochs: 200
  accelerator: auto
  devices: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  deterministic: true
  default_root_dir: ${hydra:run.dir}

logger:
  _target_: lightning.pytorch.loggers.WandbLogger
  project: contrasted
  entity: dmmiller597
  save_dir: ${hydra:run.dir}/wandb

callbacks:
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: val/loss
    mode: min
    save_top_k: 1
    dirpath: ${hydra:run.dir}/checkpoints
  - _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    mode: min
    patience: 30
    min_delta: 0.001
  - _target_: lightning.pytorch.callbacks.LearningRateMonitor
  - _target_: contrasted.callbacks.KNNEvaluationCallback

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
