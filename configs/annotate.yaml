input: data/clustered_datasets/s30/test.fasta # what we want to annotate
k: 1 # number of nearest neighbours
id_to_annotation: data/cath-domain-sf-list.txt # id to annotation file, to map hits to CATH SF's
model_path: outputs/2025-10-15/22-32-24/checkpoints/epoch=epoch=30-val_balanced_acc=val/knn_balanced_accuracy=0.9046.ckpt  # trained model checkpoint
embedding_file: data/cath-domain-seqs-S100.h5  # HDF5 file with pre-computed embeddings
ids: null  # the ids pertaining to the entries of our vector index (loaded automatically from .npy)
index: data/vector_db/train.index  # faiss vector index file
output_path: outputs/annotations/test_annotations.tsv  # where we want to save our annotations to
distance_cutoff: 0.1  # maximum cosine distance (1 - similarity) to consider valid
device: 'cpu'
return_distance: true
return_confidence: true
return_true_annotation: true  # include true annotations and compute metrics