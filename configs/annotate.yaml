input: data/clustered-datasets/test.fasta
k: 1
id_to_annotation: data/cath-domain-sf-list.txt
model_path: checkpoints/holdouts66.ckpt

# Optional path to a prepared embedding directory. If unset or missing,
# ProstT5 embeddings are generated on the fly from `input`. When set to a
# non-existent path, on-the-fly embeddings are cached there for re-runs.
embedding_dir: null

index: data/vector_db/train.pt
output_dir: outputs/annotations
distance_cutoff: 1
return_distance: true
return_confidence: false
return_true_annotation: false
batch_size: 8192
tm_align: false
structure_dir: null
tmalign_binary: TMalign
compute_metrics: false
num_thresholds: 50

# ProstT5 encoding options (used only when on-the-fly encoding is triggered)
embed:
  model_name: Rostlab/ProstT5
  half: true
  max_residues: 4000
  max_batch: 100
  max_seq_len: 1000
  dtype: float16
  device: null
