# To run this sweep, execute:
# 1. Login to W&B: wandb login
# 2. Initialize the sweep: wandb sweep configs/sweeps/supcon_sweep.yaml
# 3. Run the agent: wandb agent <SWEEP_ID>

program: train.py
method: bayes
project: contrasted
name: SupCon_Sweep
metric:
  name: val/knn_balanced_accuracy
  goal: maximize

# Hyperparameters to search
parameters:
  # Loss configuration
  model.loss_type:
    value: "supcon"

  # Temperature is THE most critical hyperparameter for SupCon
  # Focused on best performing range with granular coverage
  model.loss_params.temperature:
    values: [0.03, 0.05, 0.07, 0.1]

  # Learning rate - focused range around best values
  model.learning_rate:
    values: [0.00005, 0.0001, 0.0005]

  # Weight decay - regularization sweep in promising range
  model.weight_decay:
    values: [0.00005, 0.0001, 0.0005]




# The command that W&B will use to run your training script.
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}

