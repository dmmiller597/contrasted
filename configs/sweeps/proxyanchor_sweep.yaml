# To run this sweep, execute:
# 1. Login to W&B: wandb login
# 2. Initialize the sweep: wandb sweep configs/sweeps/proxyanchor_sweep.yaml
# 3. Run the agent: wandb agent <SWEEP_ID>

program: train.py
method: bayes
project: contrasted
name: ProxyAnchor_Sweep
metric:
  name: val/knn_balanced_accuracy
  goal: maximize

# Hyperparameters to search
parameters:
  # Loss configuration
  model.loss_type:
    value: "proxy_anchor"

  # ProxyAnchor-specific hyperparameters
  # Margin: controls the decision boundary - wider coverage in best range
  model.loss_params.margin:
    values: [0.1, 0.2, 0.3]

  # Alpha: scaling factor for the exponential - comprehensive sweep
  model.loss_params.alpha:
    values: [32, 48, 64]

  # Learning rate - expanded sweep to include more promising values
  model.learning_rate:
    values: [0.00001, 0.00005, 0.0001, 0.0003, 0.0005, 0.001, 0.003]
  
  # Batch size - explore effect on training dynamics and memory
  data.batch_size:
    values: [512, 1024, 2048]


# The command that W&B will use to run your training script.
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}

