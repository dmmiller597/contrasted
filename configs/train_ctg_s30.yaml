defaults:
  - _self_

seed: 42

datamodule:
  _target_: contrasted.data.EmbeddingDataModule
  train_fasta: data/ctg_s30/ctg_s30_train.fasta
  val_fasta: data/ctg_s30/ctg_s30_val.fasta
  test_fasta: data/ctg_s30/ctg_s30_test.fasta
  embedding_dir: data/ctg_S30-prostt5
  batch_size: 1024
  num_workers: 4

model:
  _target_: contrasted.model.ContrastiveModel
  projection_head:
    _target_: contrasted.model.ProjectionHead
    input_dim: 1024
    hidden_dim: 512
    output_dim: 128
    dropout: 0.1
  loss:
    _target_: contrasted.losses.ProxyAnchorLoss
    embedding_dim: ${model.projection_head.output_dim}
    num_classes: 0
    margin: 0.3
    alpha: 32
  learning_rate: 1e-3
  weight_decay: 1e-4
  max_epochs: ${trainer.max_epochs}
  warmup_epochs: 10

trainer:
  max_epochs: 200
  accelerator: auto
  devices: auto
  precision: 16-mixed
  gradient_clip_val: 1.0
  deterministic: true
  default_root_dir: ${hydra:run.dir}

logger:
  _target_: lightning.pytorch.loggers.WandbLogger
  project: contrasted
  entity: dmmiller597
  save_dir: ${hydra:run.dir}/wandb

callbacks:
  - _target_: lightning.pytorch.callbacks.ModelCheckpoint
    monitor: val/loss
    mode: min
    save_top_k: 1
    dirpath: ${hydra:run.dir}/checkpoints
  - _target_: lightning.pytorch.callbacks.EarlyStopping
    monitor: val/loss
    mode: min
    patience: 20
    min_delta: 0.001
  - _target_: lightning.pytorch.callbacks.LearningRateMonitor
  - _target_: contrasted.callbacks.KNNEvaluationCallback

hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: false
