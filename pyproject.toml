[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "contrasted"
version = "0.1.0"
description = "Supervised contrastive learning for CATH protein superfamily classification"
requires-python = ">=3.8"
dependencies = [
    "torch>=2.0.0",
    "pytorch-lightning>=2.0.0",
    "hydra-core>=1.3.0",
    "h5py>=3.0.0",
    "wandb>=0.15.0",
    "numpy>=1.20.0",
    "omegaconf>=2.3.0",
    "scikit-learn>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=22.0.0",
    "isort>=5.0.0",
]

